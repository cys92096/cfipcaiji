name: Scrape Cloudflare Top IPs

on:
  schedule:
    - cron: '10 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install beautifulsoup4 selenium webdriver_manager

    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: 'stable'

    - name: Run IP extraction script
      run: python extract_ips_selenium.py

    - name: Commit and push changes
      run: |
        # 1. 配置机器人身份
        git config --local user.name "GitHub Actions Bot"
        git config --local user.email "actions@github.com"
        
        # 2. 强行释放可能卡住的 Git 状态
        git rebase --abort || true
        git merge --abort || true
        
        # 3. 如果本地还有遗留的旧 top10 文件，强行改名合并，彻底不留隐患
        if [ -f "data/cloudflare_top10_ips.txt" ]; then
          mv data/cloudflare_top10_ips.txt data/cloudflare_specific_ips.txt
        fi
        
        TARGET_FILE="data/cloudflare_specific_ips.txt"
        
        if [ -s "$TARGET_FILE" ]; then
          # 4. 备份最新抓到的数据
          cp "$TARGET_FILE" /tmp/latest_ips.txt
          
          # 5. 强行重置工作区，和云端对齐历史
          git fetch origin main
          git reset --hard origin/main
          
          # 6. 将最新数据放回工作区，强行覆盖
          mkdir -p data
          cp /tmp/latest_ips.txt "$TARGET_FILE"
          
          # 7. 直接添加并生成 Commit，【绝不进行变动对比】，无条件更新！
          git add "$TARGET_FILE"
          COMMIT_TIME=$(date +"%Y-%m-%d %H:%M")
          git commit -m "Automated Cloudflare Top IPs update (${COMMIT_TIME})"
          
          # 8. 强推(Force Push)到远程，不管冲突，以此版本为王
          echo "🚀 正在无条件强推最新数据，解决一切冲突..."
          git push "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" main --force
        else
          echo "❌ 错误: 未能生成有效文件，跳过推送。"
        fi
