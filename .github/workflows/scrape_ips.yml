name: Scrape Cloudflare Top IPs

on:
  schedule:
    - cron: '10 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install beautifulsoup4 selenium webdriver_manager

    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: 'stable'

    - name: Run IP extraction script
      run: python extract_ips_selenium.py

    - name: Commit and push changes
      run: |
        git config --local user.name "GitHub Actions Bot"
        git config --local user.email "actions@github.com"
        
        git rebase --abort || true
        git merge --abort || true
        
        # 1. 检查 Python 脚本到底生成了哪个文件，并统一命名
        if [ -f "data/cloudflare_top10_ips.txt" ]; then
          mv data/cloudflare_top10_ips.txt data/cloudflare_specific_ips.txt
        fi
        
        TARGET_FILE="data/cloudflare_specific_ips.txt"
        
        if [ -s "$TARGET_FILE" ]; then
          # 2. 备份最新数据
          cp "$TARGET_FILE" /tmp/latest_ips.txt
          
          # 3. 强制洗白本地历史
          git fetch origin main
          git reset --hard origin/main
          
          # 4. 把最新数据拿回来覆盖
          mkdir -p data
          cp /tmp/latest_ips.txt "$TARGET_FILE"
          
          # 5. 直接无条件强推
          git add "$TARGET_FILE"
          COMMIT_TIME=$(date +"%Y-%m-%d %H:%M")
          git commit -m "Automated Cloudflare Top IPs update (${COMMIT_TIME})"
          
          echo "🚀 强行覆盖远程旧文件..."
          git push "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" main --force
        else
          echo "❌ 错误: 未能生成有效数据。"
        fi
