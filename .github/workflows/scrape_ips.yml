name: Scrape Cloudflare Top IPs

on:
  schedule:
    - cron: '10 */2 * * *'
  workflow_dispatch: # 允许手动触发

# 核心修复 1：显式授予 Actions 写入仓库的权限
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # 核心修复 2：使用默认 Token 认证，并获取完整历史以支持 rebase
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0 

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install beautifulsoup4 selenium webdriver_manager

    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: 'stable'

    - name: Run IP extraction script
      run: python extract_ips_selenium.py

    - name: Commit and push changes
      run: |
        # 1. 配置 Git 身份
        git config --local user.name "GitHub Actions Bot"
        git config --local user.email "actions@github.com"
        
        # 2. 获取正确的时间戳
        COMMIT_TIME=$(date +"%Y-%m-%d %H:%M")
        
        # 3. 动态识别生成的文件（兼容 top10 或 specific 命名）
        TARGET_FILE=$(ls data/cloudflare_*.txt | head -n 1)
        
        if [ -s "$TARGET_FILE" ]; then
          git add "$TARGET_FILE"
          
          if git diff --staged --quiet; then
            echo "IP数据未发生变化，无需更新。"
          else
            git commit -m "Automated Cloudflare Top IPs update (${COMMIT_TIME})"
            
            # 4. 核心修复 3：拉取时强制指定远程分支，确保同步
            git fetch origin main
            git rebase origin/main
            
            # 5. 推送
            git push origin main
          fi
        else
          echo "未生成有效的 IP 数据文件或文件为空，跳过提交。"
        fi
