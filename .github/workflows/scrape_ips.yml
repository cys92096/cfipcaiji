name: Scrape Cloudflare Top IPs

on:
  schedule:
    - cron: '10 */2 * * *'  # 每 2 小时自动运行一次
  workflow_dispatch: # 允许在 GitHub 页面上手动点击触发

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0 

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install beautifulsoup4 selenium webdriver_manager

    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: 'stable'

    - name: Run IP extraction script
      run: python extract_ips_selenium.py  # 请确保你仓库里的爬虫脚本名叫这个

    - name: Commit and push changes
      run: |
        # 1. 配置 Git 身份
        git config --local user.name "GitHub Actions Bot"
        git config --local user.email "actions@github.com"
        
        # 2. 获取正确的时间戳
        COMMIT_TIME=$(date +"%Y-%m-%d %H:%M")
        TARGET_FILE="data/cloudflare_specific_ips.txt"
        
        if [ -s "$TARGET_FILE" ]; then
          # 3. 先把本地刚生成的好文件备份到临时目录，防止被远程同步冲掉
          cp "$TARGET_FILE" /tmp/latest_ips.txt
          
          # 4. 强制把本地的分支指针同步到远程最新状态，消除本地可能积压的冲突历史
          git fetch origin main
          git reset --hard origin/main
          
          # 5. 把刚刚备份的最新的 IP 数据拷贝回来，实现强行覆盖
          mkdir -p data
          cp /tmp/latest_ips.txt "$TARGET_FILE"
          
          # 6. 重新添加并检查是否有真正的内容变动
          git add "$TARGET_FILE"
          
          if git diff --staged --quiet; then
            echo "IP数据与远程相比未发生变化，无需更新。"
          else
            # 7. 有变动则提交，并使用强制推送（--force）解决一切冲突
            git commit -m "Automated Cloudflare Top IPs update (${COMMIT_TIME})"
            echo "正在强行推送到远程仓库..."
            git push "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" main --force
          fi
        else
          echo "未生成有效的 IP 数据文件或文件为空，跳过提交。"
        fi
